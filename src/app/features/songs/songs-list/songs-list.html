<div>
  <h2>Canciones</h2>

  <app-song-form (songCreated)="loadSongs()"/>

  @if (loading()) {
    <p>Cargando...</p>
  }

  @if (error()) {
    <p>{{ error() }}</p>
  }

  @if (!loading() && songs().length === 0) {
    <p>No hay notas aún.</p>
  }

  @for (song of songs(); track song.id) {
    <div>
      <p>{{ song.message }}</p>
      <a [href]="song.url">Enlace</a>
      <small>{{ song.created_at }}</small>
    </div>
  }
</div>
