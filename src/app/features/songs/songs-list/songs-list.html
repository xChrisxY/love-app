<div>
  <h2>Canciones</h2>

  <app-song-form (songCreated)="loadSongs()"/>

  @if (loading()) {
    <p>Cargando...</p>
  }

  @if (error()) {
    <p>{{ error() }}</p>
  }

  @if (!loading() && songs().length === 0) {
    <p>No hay notas aún.</p>
  }

  @for (song of songs(); track song.id) {
    <div class="song-card">
      <p class="song-message">🎵 {{ song.message }}</p>
      <a class="song-link" [href]="song.url" target="_blank">
        Escuchar canción
      </a>
      <small class="song-date">{{ song.created_at }}</small>
    </div>
  }
</div>
